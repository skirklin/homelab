<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafafa;
    }
    .header {
      padding: 10px 16px;
      background: #7c2d12;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 14px; font-weight: 600; }
    .body { padding: 12px 16px; }
    .msg { color: #666; font-size: 12px; padding: 8px 0; }
    .msg.error { color: #b91c1c; }
    .msg.success { color: #166534; }
    label { font-size: 11px; color: #666; display: block; margin: 8px 0 2px; }
    select, button {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
    }
    .recipe-name { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
    button.primary {
      margin-top: 12px;
      background: #7c2d12;
      color: white;
      border: 0;
      cursor: pointer;
      font-weight: 600;
    }
    button.primary:disabled { background: #d6c4bb; cursor: default; }
    .link { color: #7c2d12; cursor: pointer; text-decoration: underline; }
    a { color: #7c2d12; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Recipe Clipper</h1>
  </div>
  <div class="body" id="body">
    <div class="msg" id="status">Scanning page…</div>
    <div id="picker" style="display:none;">
      <label for="recipeSelect">Recipe</label>
      <select id="recipeSelect"></select>
      <label for="boxSelect">Save to box</label>
      <select id="boxSelect"></select>
      <button class="primary" id="importBtn">Import recipe</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>

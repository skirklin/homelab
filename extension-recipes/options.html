<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Recipe Clipper — Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      max-width: 520px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 { font-size: 18px; margin-bottom: 4px; color: #7c2d12; }
    p.sub { color: #666; font-size: 13px; margin-bottom: 20px; }
    label { display: block; font-size: 12px; color: #444; margin: 16px 0 4px; font-weight: 600; }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    .hint { font-size: 12px; color: #888; margin-top: 4px; }
    .row { display: flex; gap: 10px; margin-top: 20px; }
    button {
      padding: 8px 16px;
      border: 0;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
    }
    button.primary { background: #7c2d12; color: white; }
    button.secondary { background: #e7e5e4; color: #1a1a1a; }
    #status { margin-top: 16px; font-size: 13px; }
    #status.ok { color: #166534; }
    #status.err { color: #b91c1c; }
    a { color: #7c2d12; }
  </style>
</head>
<body>
  <h1>Recipe Clipper</h1>
  <p class="sub">Saves recipes from the page you're viewing into your homelab recipe boxes.</p>

  <label for="apiBaseUrl">API base URL</label>
  <input type="text" id="apiBaseUrl" placeholder="https://api.kirkl.in">
  <div class="hint">Leave as <code>https://api.kirkl.in</code> unless you're testing against a local dev server.</div>

  <label for="apiToken">API token</label>
  <input type="password" id="apiToken" placeholder="hlk_…" autocomplete="off">
  <div class="hint">Mint one at <a href="https://kirkl.in" target="_blank">kirkl.in</a> → Settings → API Tokens. Starts with <code>hlk_</code>.</div>

  <div class="row">
    <button class="primary" id="saveBtn">Save</button>
    <button class="secondary" id="testBtn">Test connection</button>
  </div>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>

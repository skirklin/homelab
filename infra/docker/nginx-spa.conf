server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # The service worker, push handler, web manifest, and index shell are how
    # the browser learns the app has new code. They live at stable URLs but
    # their content changes on every deploy, so they must never be cached
    # beyond a conditional revalidation. (Previously these matched the
    # regex below and got `immutable, max-age=1y`, which left phones serving
    # months-old bundles until a hard refresh.)
    location = /sw.js              { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /push-sw.js         { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /index.html         { add_header Cache-Control "no-cache"; try_files $uri =404; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets (Vite emits content-hashed filenames) can be cached for a
    # year — the URL changes whenever the content changes.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

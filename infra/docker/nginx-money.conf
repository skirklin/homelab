server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the ingest service
    location /api/ {
        proxy_pass http://ingest.homelab.svc.cluster.local:5555;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://ingest.homelab.svc.cluster.local:5555;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the ingest service
    location /api/ {
        proxy_pass http://ingest.homelab.svc.cluster.local:5555;
        proxy_set_header Host $host;
    }

    location /extension/ {
        proxy_pass http://ingest.homelab.svc.cluster.local:5555;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://ingest.homelab.svc.cluster.local:5555;
    }

    # See nginx-spa.conf for the rationale: these URLs are stable but their
    # content changes per deploy, so caching them as immutable strands old
    # bundles on installed PWAs.
    location = /sw.js              { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /push-sw.js         { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /index.html         { add_header Cache-Control "no-cache"; try_files $uri =404; }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

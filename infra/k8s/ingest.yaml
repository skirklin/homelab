apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingest
  template:
    metadata:
      labels:
        app: ingest
    spec:
      containers:
        - name: ingest
          image: localhost:30500/homelab/ingest:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5555
          volumeMounts:
            - name: data
              mountPath: /app/.data
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 1000m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ingest-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ingest-data
  namespace: homelab
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ingest
  namespace: homelab
spec:
  type: ClusterIP
  selector:
    app: ingest
  ports:
    - port: 5555
      targetPort: 5555

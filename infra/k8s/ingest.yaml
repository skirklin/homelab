apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingest
  template:
    metadata:
      labels:
        app: ingest
    spec:
      containers:
        - name: ingest
          image: homelab/ingest:latest
          ports:
            - containerPort: 5555
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 1000m
---
apiVersion: v1
kind: Service
metadata:
  name: ingest
  namespace: homelab
spec:
  selector:
    app: ingest
  ports:
    - port: 5555
      targetPort: 5555

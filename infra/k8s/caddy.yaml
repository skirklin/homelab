apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: homelab
data:
  Caddyfile: |
    # Public apps — each site block lists both the production and
    # beta hostnames. Caddy auto-requests Let's Encrypt certs for all.

    kirkl.in, beta.kirkl.in, home.kirkl.in {
        reverse_proxy home.homelab.svc.cluster.local:80
    }

    recipes.kirkl.in, recipes.beta.kirkl.in {
        reverse_proxy recipes.homelab.svc.cluster.local:80
    }

    shopping.kirkl.in, shopping.beta.kirkl.in {
        reverse_proxy shopping.homelab.svc.cluster.local:80
    }

    # life is a module in home, not a standalone app

    upkeep.kirkl.in, upkeep.beta.kirkl.in {
        reverse_proxy upkeep.homelab.svc.cluster.local:80
    }

    travel.kirkl.in, travel.beta.kirkl.in {
        reverse_proxy travel.homelab.svc.cluster.local:80
    }

    me.kirkl.in, me.beta.kirkl.in {
        reverse_proxy homepage.homelab.svc.cluster.local:80
    }

    # money app is tailnet-only — no public Caddy route
    # Access via http://<tailscale-ip>:30080/money or direct NodePort

    registry.kirkl.in, registry.beta.kirkl.in {
        basic_auth {
            deploy {$REGISTRY_HTPASSWD}
        }
        reverse_proxy registry.homelab.svc.cluster.local:5000
    }

    api.kirkl.in, api.beta.kirkl.in {
        handle_path /fn/* {
            reverse_proxy functions.homelab.svc.cluster.local:3000
        }
        handle {
            reverse_proxy pocketbase.homelab.svc.cluster.local:8090
        }
    }

    # MCP server — public so Anthropic-hosted clients (Claude Desktop / mobile)
    # can reach it. Auth is OAuth 2.1; no path stripping so /mcp, /oauth/*,
    # and /.well-known/* hit the functions service unchanged.
    # Overwrite X-Forwarded-For and set X-Real-IP from the actual TCP peer so
    # the rate limiter on /oauth/login and /oauth/token can't be bypassed by a
    # client-supplied X-Forwarded-For header (default Caddy behavior is to
    # *append* to inbound XFF, which would let any caller spoof the leftmost
    # entry that the rate limiter keys off).
    mcp.kirkl.in {
        reverse_proxy functions.homelab.svc.cluster.local:3000 {
            header_up X-Forwarded-For {http.request.remote.host}
            header_up X-Real-IP {http.request.remote.host}
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy
  namespace: homelab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: caddy
  template:
    metadata:
      labels:
        app: caddy
    spec:
      containers:
        - name: caddy
          image: caddy:2-alpine
          envFrom:
            - secretRef:
                name: registry-auth
                optional: true
          ports:
            - containerPort: 80
              hostPort: 80
            - containerPort: 443
              hostPort: 443
          volumeMounts:
            - name: config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            - name: data
              mountPath: /data
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits: { memory: 128Mi, cpu: 200m }
      volumes:
        - name: config
          configMap:
            name: caddy-config
        - name: data
          persistentVolumeClaim:
            claimName: caddy-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: caddy-data
  namespace: homelab
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: caddy
  namespace: homelab
spec:
  type: NodePort
  selector:
    app: caddy
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: https
      port: 443
      targetPort: 443
      nodePort: 30443

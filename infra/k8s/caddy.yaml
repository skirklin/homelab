apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: homelab
data:
  Caddyfile: |
    # Public apps

    beta.kirkl.in {
        reverse_proxy home.homelab.svc.cluster.local:80
    }

    recipes.beta.kirkl.in {
        reverse_proxy recipes.homelab.svc.cluster.local:80
    }

    groceries.beta.kirkl.in {
        reverse_proxy groceries.homelab.svc.cluster.local:80
    }

    life.beta.kirkl.in {
        reverse_proxy life.homelab.svc.cluster.local:80
    }

    upkeep.beta.kirkl.in {
        reverse_proxy upkeep.homelab.svc.cluster.local:80
    }

    travel.beta.kirkl.in {
        reverse_proxy travel.homelab.svc.cluster.local:80
    }

    me.beta.kirkl.in {
        reverse_proxy homepage.homelab.svc.cluster.local:80
    }

    money.beta.kirkl.in {
        reverse_proxy money.homelab.svc.cluster.local:80
    }

    api.beta.kirkl.in {
        reverse_proxy pocketbase.homelab.svc.cluster.local:8090
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caddy
  template:
    metadata:
      labels:
        app: caddy
    spec:
      containers:
        - name: caddy
          image: caddy:2-alpine
          ports:
            - containerPort: 80
              hostPort: 80
            - containerPort: 443
              hostPort: 443
          volumeMounts:
            - name: config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            - name: data
              mountPath: /data
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits: { memory: 128Mi, cpu: 200m }
      volumes:
        - name: config
          configMap:
            name: caddy-config
        - name: data
          persistentVolumeClaim:
            claimName: caddy-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: caddy-data
  namespace: homelab
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: caddy
  namespace: homelab
spec:
  type: NodePort
  selector:
    app: caddy
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: https
      port: 443
      targetPort: 443
      nodePort: 30443

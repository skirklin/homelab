apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: homelab
data:
  Caddyfile: |
    # Public apps

    beta.kirkl.in {
        reverse_proxy home.homelab.svc.cluster.local:80
    }

    recipes.beta.kirkl.in {
        reverse_proxy recipes.homelab.svc.cluster.local:80
    }

    shopping.beta.kirkl.in {
        reverse_proxy shopping.homelab.svc.cluster.local:80
    }

    # life is a module in home, not a standalone app

    upkeep.beta.kirkl.in {
        reverse_proxy upkeep.homelab.svc.cluster.local:80
    }

    travel.beta.kirkl.in {
        reverse_proxy travel.homelab.svc.cluster.local:80
    }

    me.beta.kirkl.in {
        reverse_proxy homepage.homelab.svc.cluster.local:80
    }

    # money app is tailnet-only — no public Caddy route
    # Access via http://<tailscale-ip>:30080/money or direct NodePort

    registry.beta.kirkl.in {
        basic_auth {
            deploy {$REGISTRY_HTPASSWD}
        }
        reverse_proxy registry.homelab.svc.cluster.local:5000
    }

    api.beta.kirkl.in {
        handle_path /fn/* {
            reverse_proxy functions.homelab.svc.cluster.local:3000
        }
        handle {
            reverse_proxy pocketbase.homelab.svc.cluster.local:8090
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy
  namespace: homelab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: caddy
  template:
    metadata:
      labels:
        app: caddy
    spec:
      containers:
        - name: caddy
          image: caddy:2-alpine
          envFrom:
            - secretRef:
                name: registry-auth
                optional: true
          ports:
            - containerPort: 80
              hostPort: 80
            - containerPort: 443
              hostPort: 443
          volumeMounts:
            - name: config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
            - name: data
              mountPath: /data
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits: { memory: 128Mi, cpu: 200m }
      volumes:
        - name: config
          configMap:
            name: caddy-config
        - name: data
          persistentVolumeClaim:
            claimName: caddy-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: caddy-data
  namespace: homelab
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: caddy
  namespace: homelab
spec:
  type: NodePort
  selector:
    app: caddy
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: https
      port: 443
      targetPort: 443
      nodePort: 30443

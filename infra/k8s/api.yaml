apiVersion: apps/v1
kind: Deployment
metadata:
  name: functions
  namespace: homelab
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: functions
  template:
    metadata:
      labels:
        app: functions
    spec:
      containers:
        - name: functions
          image: localhost:30500/homelab/functions:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          env:
            - name: PORT
              value: "3000"
            - name: PB_URL
              value: "http://pocketbase:8090"
            - name: DOMAIN
              value: "kirkl.in"
            - name: MCP_ALLOWED_HOSTS
              value: "mcp.kirkl.in,mcp.tail56ca88.ts.net"
            - name: MCP_ISSUER
              value: "https://mcp.kirkl.in"
          envFrom:
            - secretRef:
                name: api-secrets
                optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: functions
  namespace: homelab
spec:
  selector:
    app: functions
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp
  namespace: homelab
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: functions
      port:
        number: 3000
  tls:
    - hosts:
        - mcp

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pocketbase-data
  namespace: homelab
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pocketbase
  namespace: homelab
spec:
  serviceName: pocketbase
  replicas: 1
  selector:
    matchLabels:
      app: pocketbase
  template:
    metadata:
      labels:
        app: pocketbase
    spec:
      containers:
        - name: pocketbase
          image: localhost:30500/homelab/pocketbase:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          volumeMounts:
            - name: data
              mountPath: /pb/pb_data
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 500m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pocketbase-data
---
apiVersion: v1
kind: Service
metadata:
  name: pocketbase
  namespace: homelab
spec:
  selector:
    app: pocketbase
  ports:
    - port: 8090
      targetPort: 8090

---
# --- monitor (tailnet-only) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor
  namespace: homelab
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: monitor
  template:
    metadata:
      labels:
        app: monitor
    spec:
      containers:
        - name: monitor
          image: localhost:30500/homelab/monitor:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            # Injected into nginx.conf at startup via nginx:alpine's
            # /etc/nginx/templates/* envsubst pass.
            - name: HOMELAB_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: api-secrets
                  key: HOMELAB_API_TOKEN
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests: { memory: 32Mi, cpu: 10m }
            limits: { memory: 64Mi, cpu: 100m }
---
apiVersion: v1
kind: Service
metadata:
  name: monitor
  namespace: homelab
spec:
  selector:
    app: monitor
  ports:
    - port: 80
      targetPort: 80


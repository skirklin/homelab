# Frontend app deployments — all follow the same pattern:
# nginx container serving static Vite build output.

# --- home (shell app) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home
  namespace: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home
  template:
    metadata:
      labels:
        app: home
    spec:
      containers:
        - name: home
          image: homelab/home:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          resources:
            requests: { memory: 32Mi, cpu: 10m }
            limits: { memory: 64Mi, cpu: 100m }
---
apiVersion: v1
kind: Service
metadata:
  name: home
  namespace: homelab
spec:
  selector:
    app: home
  ports:
    - port: 80
      targetPort: 80


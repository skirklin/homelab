# Frontend app deployments — all follow the same pattern:
# nginx container serving static Vite build output.

# --- home (shell app) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home
  namespace: homelab
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: home
  template:
    metadata:
      labels:
        app: home
    spec:
      containers:
        - name: home
          image: localhost:30500/homelab/home:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests: { memory: 32Mi, cpu: 10m }
            limits: { memory: 64Mi, cpu: 100m }
---
apiVersion: v1
kind: Service
metadata:
  name: home
  namespace: homelab
spec:
  selector:
    app: home
  ports:
    - port: 80
      targetPort: 80


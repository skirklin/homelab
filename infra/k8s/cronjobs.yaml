# Daily upkeep task notification check — 8 AM Pacific
apiVersion: batch/v1
kind: CronJob
metadata:
  name: upkeep-notifications
  namespace: homelab
spec:
  schedule: "0 8 * * *"
  timeZone: "America/Los_Angeles"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: trigger
              image: curlimages/curl:latest
              command: ["sh", "-c"]
              args:
                - |
                  curl -sf -X POST \
                    -H "Authorization: Bearer $HOMELAB_API_TOKEN" \
                    http://functions.homelab.svc.cluster.local:3000/notifications/upkeep-check
              envFrom:
                - secretRef:
                    name: api-secrets
---
# Travel notifications — hourly tick. The function decides whether each
# active trip is at its local 7am (morning push) or 8pm (evening prompt).
# Per-trip timezone is derived from the day's first activity coords.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: travel-tick
  namespace: homelab
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: trigger
              image: curlimages/curl:latest
              command: ["sh", "-c"]
              args:
                - |
                  curl -sf -X POST \
                    -H "Authorization: Bearer $HOMELAB_API_TOKEN" \
                    http://functions.homelab.svc.cluster.local:3000/notifications/travel-tick
              envFrom:
                - secretRef:
                    name: api-secrets

# NOTE: the notification-trigger CronJobs (upkeep-notifications,
# life-reminders-check, travel-tick, observer-weekly) that used to live here
# have been replaced by an in-process scheduler running inside the functions
# service — see services/api/src/lib/notifications/scheduler.ts. Only the
# PocketBase-maintenance CronJobs remain below: they hit PB directly and must
# run even when functions is down.

# Daily PocketBase backup — 2 AM Pacific. Snapshots the whole pb_data
# dir (collections + records + uploaded files) into a zip in
# /pb/pb_data/backups/ on the PocketBase PVC. The 2026-05-22 life_events
# migration data loss (recovered only because a pre-migration-20260419
# zip happened to be there) prompted this — daily zips give us a known
# floor on data-recovery RPO. Pruner CronJob (pb-backup-prune below)
# handles rotation.
#
# Uses alpine/curl (curl + jq) so we can extract the auth token cleanly
# from the JSON response without sed gymnastics. Hits PB cluster-internal
# via the homelab.svc.cluster.local Service.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pb-backup-daily
  namespace: homelab
spec:
  schedule: "0 9 * * *"  # 2 AM Pacific (PDT = UTC-7); slips by an hour during PST
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: backup
              image: alpine/curl:latest
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  # alpine/curl ships only curl — install jq for token parsing.
                  apk add --no-cache jq >/dev/null
                  PB=http://pocketbase.homelab.svc.cluster.local:8090
                  # Superuser auth — PB returns 200 + {token: "..."} on success.
                  # NOTE: PB session tokens go in `Authorization: <token>` (no
                  # Bearer prefix), unlike hlk_/mcpat_ tokens which DO use Bearer.
                  TOKEN=$(curl -sf -X POST "$PB/api/collections/_superusers/auth-with-password" \
                    -H "Content-Type: application/json" \
                    -d "{\"identity\":\"$PB_ADMIN_EMAIL\",\"password\":\"$PB_ADMIN_PASSWORD\"}" \
                    | jq -er .token)
                  # PB enforces lowercase-only on backup names (regex
                  # `^[a-z0-9_-]+\.zip$`), so use lowercase `t`/`z`
                  # separators instead of the ISO 8601 uppercase form.
                  KEY="daily-$(date -u +%Y-%m-%dt%H-%M-%Sz).zip"
                  curl -sf -X POST "$PB/api/backups" \
                    -H "Authorization: $TOKEN" \
                    -H "Content-Type: application/json" \
                    -d "{\"name\":\"$KEY\"}"
                  echo "[pb-backup-daily] created $KEY"
              envFrom:
                - secretRef:
                    name: api-secrets
---
# Backup pruner — runs just after the daily backup. Tiered retention:
#
#   - daily-*           : geometric (log2) thinning curve. Age ≤ 7 days →
#                         keep EVERY daily. Age > 7 days → keep only the
#                         NEWEST daily in each geometric age bucket, where
#                         bucket = floor(log2(ageDays)). That's one
#                         representative per doubling age band — [8,15]d,
#                         [16,31]d, [32,63]d, [64,127]d, … — kept
#                         indefinitely; every other >7d daily is deleted.
#                         Age is read from the YYYY-MM-DD embedded in the
#                         key (robust; matches how PB stamps the name), not
#                         from .modified. (Replaces the old "keep 90 days +
#                         first-of-month forever" policy.)
#   - pre-deploy-*      : keep only the newest 10 (by .modified), delete the
#                         rest regardless of age. Count-bounded rather than
#                         time-bounded because at ~12 deploys/day during active
#                         work a 14-day window let these accrue to 75+ (~2 GB);
#                         they're belt-and-suspenders insurance and the daily-*
#                         tier is the real backstop.
#   - pre-migration-*   : keep forever (manual / migration-related, rare,
#                         load-bearing — the only thing that saved the
#                         2026-05-22 life_events incident)
#   - anything else     : keep forever (be conservative — manual backups
#                         the user took get the same protection)
#
# Sizing note: the geometric curve is self-bounding — past 7 days the kept
# count grows ~log2(age), so an unbounded history settles to a few dozen
# snapshots total (≤7 dailies + one per doubling band) rather than growing
# linearly. At ~30 MB/snapshot that's well under 1 GB indefinitely.
#
# Safety: set PRUNE_DRY_RUN=1 (env) to log intended deletes without issuing
# any DELETE — used by a one-shot Job to preview before trusting the nightly.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pb-backup-prune
  namespace: homelab
spec:
  schedule: "5 9 * * *"  # 5 min after pb-backup-daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: prune
              image: alpine/curl:latest
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  # alpine/curl ships only curl — install jq for token + filtering,
                  # and coreutils to replace BusyBox `date` (which silently returns
                  # "invalid date" for the RFC3339-ish strings PB hands back in
                  # `modified`, so the `|| echo ""` fallback below caught *every*
                  # row and nothing was ever pruned — see 2026-05-24 nightly logs).
                  # After `apk add coreutils`, /bin/date is GNU date with full -d.
                  apk add --no-cache jq coreutils >/dev/null
                  # Dry-run toggle: when PRUNE_DRY_RUN is non-empty, log intended
                  # deletes but issue no DELETE. Unset (default in the spec) =
                  # real deletes, identical to prior behavior.
                  DRY="${PRUNE_DRY_RUN:-}"
                  PB=http://pocketbase.homelab.svc.cluster.local:8090
                  TOKEN=$(curl -sf -X POST "$PB/api/collections/_superusers/auth-with-password" \
                    -H "Content-Type: application/json" \
                    -d "{\"identity\":\"$PB_ADMIN_EMAIL\",\"password\":\"$PB_ADMIN_PASSWORD\"}" \
                    | jq -er .token)
                  NOW=$(date -u +%s)
                  # GET /api/backups returns [{key, size, modified}, ...].
                  # `modified` is RFC3339-ish UTC ("2026-05-22 09:00:00.123Z"
                  # in current PB versions). Normalize space→T and strip
                  # sub-seconds so `date -d` (GNU, installed above) parses it.
                  BACKUPS=$(curl -sf "$PB/api/backups" -H "Authorization: $TOKEN")
                  # daily delete set: geometric (log2) thinning. Age is read from
                  # the YYYY-MM-DD embedded in the key (robust; mirrors how the PB
                  # backup name is stamped), epoch'd at UTC midnight. Keep every
                  # daily ≤ 7 days old; among the >7d set keep only the NEWEST
                  # (lexicographic max on the YYYY-MM-DD date == chronological max)
                  # per floor(log2(ageDays)) bucket, delete the rest. jq 1.7 has
                  # strptime/mktime/log. Written to a var the while-loop greps.
                  DAILY_DELETE=$(printf '%s' "$BACKUPS" | jq -r --argjson now "$NOW" '
                    [ .[]
                      | select(.key | test("^daily-"))
                      | (.key | capture("^daily-(?<d>[0-9]{4}-[0-9]{2}-[0-9]{2})") | .d) as $d
                      | ($d + "T00:00:00Z" | strptime("%Y-%m-%dT%H:%M:%SZ") | mktime) as $epoch
                      | { key: .key, d: $d, ageDays: (($now - $epoch) / 86400) }
                    ]
                    | map(select(.ageDays > 7))
                    | group_by(.ageDays | log / (2 | log) | floor)
                    | map( (max_by(.d) | .key) as $keep | .[] | select(.key != $keep) | .key )
                    | .[]
                  ')
                  echo "[pb-backup-prune] daily geometric-delete set:"
                  printf '  %s\n' $DAILY_DELETE
                  # pre-deploy delete set: every pre-deploy-* EXCEPT the newest
                  # 10 by .modified. Count-bounded so the tier can't bloat no
                  # matter how often we deploy. `.[10:]` keeps the 11th-onward
                  # (oldest) after a descending sort — i.e. the ones to delete.
                  PREDEPLOY_DELETE=$(printf '%s' "$BACKUPS" | jq -r '
                    [.[] | select(.key | test("^pre-deploy-"))]
                    | sort_by(.modified) | reverse | .[10:] | .[].key
                  ')
                  printf '%s' "$BACKUPS" \
                    | jq -r '.[] | "\(.key)\t\(.modified)"' \
                    | while IFS="$(printf '\t')" read -r KEY MODIFIED; do
                        ISO=$(printf '%s' "$MODIFIED" | sed 's/ /T/; s/\.[0-9]*Z/Z/; s/\.[0-9]*$//')
                        TS=$(date -u -d "$ISO" +%s 2>/dev/null || echo "")
                        if [ -z "$TS" ]; then
                          echo "[pb-backup-prune] skip (unparseable date) $KEY $MODIFIED" >&2
                          continue
                        fi
                        case "$KEY" in
                          daily-*)
                            if printf '%s\n' "$DAILY_DELETE" | grep -qxF "$KEY"; then
                              if [ -n "$DRY" ]; then
                                echo "[pb-backup-prune] DRY would delete $KEY"
                              else
                                echo "[pb-backup-prune] delete (geom >7d) $KEY"
                                curl -sf -X DELETE "$PB/api/backups/$KEY" -H "Authorization: $TOKEN"
                              fi
                            fi
                            ;;
                          pre-deploy-*)
                            if printf '%s\n' "$PREDEPLOY_DELETE" | grep -qxF "$KEY"; then
                              if [ -n "$DRY" ]; then
                                echo "[pb-backup-prune] DRY would delete $KEY"
                              else
                                echo "[pb-backup-prune] delete (>newest 10) $KEY"
                                curl -sf -X DELETE "$PB/api/backups/$KEY" -H "Authorization: $TOKEN"
                              fi
                            fi
                            ;;
                          *)
                            # pre-migration-* and any manually-named backups — keep.
                            ;;
                        esac
                      done
                  echo "[pb-backup-prune] done"
              envFrom:
                - secretRef:
                    name: api-secrets
---
# pod_events pruner — daily TTL on routine k8s Event noise.
#
# event-watcher streams every k8s Event (kind=Pod) into the pod_events PB
# collection so we have a long-term history (k8s itself only retains Events
# for ~1h). With no built-in retention, the table grew unbounded: ~1,500
# Normal rows/day of routine pod-startup chatter (Pulled, Scheduled, Started,
# Created, Pulling) hit ~23k rows in 14 days before we noticed.
#
# Policy: delete Normal-type rows older than 10 days; keep all Warnings
# forever (low volume, high forensic value). At ~1.5k Normals/day this
# bounds steady-state size at ~15k rows + however many Warnings accrue —
# small and predictable.
#
# History note: on 2026-05-24 a one-shot manual prune removed 22.9k rows of
# pre-policy noise. This CronJob is what keeps it from coming back.
#
# Auth + tooling mirrors pb-backup-prune above: alpine/curl image, jq for
# JSON parsing, superuser auth via PB_ADMIN_EMAIL/PB_ADMIN_PASSWORD from
# api-secrets, `Authorization: $TOKEN` (no Bearer prefix — PB session
# tokens, not hlk_/mcpat_).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pod-events-prune
  namespace: homelab
spec:
  schedule: "30 9 * * *"  # 2:30 AM Pacific (PDT); after pb-backup-prune
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: prune
              image: alpine/curl:latest
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  # alpine/curl ships only curl — install jq for token + URI
                  # encoding, and coreutils to replace BusyBox `date` (which
                  # doesn't grok `-d '10 days ago'` or `-d @<epoch>`). After
                  # `apk add coreutils`, /bin/date is GNU date with full -d.
                  apk add --no-cache jq coreutils >/dev/null
                  PB=http://pocketbase.homelab.svc.cluster.local:8090
                  TOKEN=$(curl -sf -X POST "$PB/api/collections/_superusers/auth-with-password" \
                    -H "Content-Type: application/json" \
                    -d "{\"identity\":\"$PB_ADMIN_EMAIL\",\"password\":\"$PB_ADMIN_PASSWORD\"}" \
                    | jq -er .token)
                  # PB stores `created` as "YYYY-MM-DD HH:MM:SS.sssZ" (space
                  # separator, ms precision, trailing Z). Build the cutoff in
                  # that exact shape so the string compare in the filter works.
                  # Relies on coreutils `date -d` (installed above).
                  CUTOFF=$(date -u -d '10 days ago' +'%Y-%m-%d %H:%M:%S.000Z')
                  FILTER="created < \"$CUTOFF\" && type = \"Normal\""
                  # PB filter must be URI-encoded; jq -sRr @uri is the safe path
                  # (handles quotes, spaces, &, <, =, etc. consistently).
                  ENCODED=$(printf '%s' "$FILTER" | jq -sRr @uri)
                  echo "[pod-events-prune] cutoff=$CUTOFF"
                  TOTAL=0
                  while :; do
                    # Pull a page of ids matching the filter. We always read
                    # page=1 because every iteration deletes its batch — the
                    # next call sees a fresh first page of survivors.
                    PAGE=$(curl -sf "$PB/api/collections/pod_events/records?perPage=500&fields=id&filter=$ENCODED" \
                      -H "Authorization: $TOKEN")
                    IDS=$(printf '%s' "$PAGE" | jq -r '.items[].id')
                    if [ -z "$IDS" ]; then
                      break
                    fi
                    COUNT=0
                    for ID in $IDS; do
                      curl -sf -X DELETE "$PB/api/collections/pod_events/records/$ID" \
                        -H "Authorization: $TOKEN"
                      COUNT=$((COUNT + 1))
                    done
                    TOTAL=$((TOTAL + COUNT))
                    echo "[pod-events-prune] deleted batch=$COUNT total=$TOTAL"
                  done
                  echo "[pod-events-prune] done total=$TOTAL"
              envFrom:
                - secretRef:
                    name: api-secrets
---
# notification_log pruner — daily TTL on the notification sent-ledger.
#
# The notification crons write one notification_log row per (user, kind, bucket)
# when a push lands (the single idempotency store — migration 20260619_200000).
# The ledger only needs the CURRENT window to suppress same-day duplicates;
# 30 days of history is generous forensic headroom. Without retention it would
# grow ~one row per user per cron per day forever.
#
# Policy: delete rows whose `sent_at` is older than 30 days. Mirrors
# pod-events-prune exactly (alpine/curl + jq + coreutils date, superuser auth,
# page-and-delete loop). `sent_at` is a PB date column in the same
# "YYYY-MM-DD HH:MM:SS.sssZ" shape as `created`, so the cutoff compare matches.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: notification-log-prune
  namespace: homelab
spec:
  schedule: "35 9 * * *"  # 2:35 AM Pacific (PDT); after pod-events-prune
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: prune
              image: alpine/curl:latest
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  apk add --no-cache jq coreutils >/dev/null
                  PB=http://pocketbase.homelab.svc.cluster.local:8090
                  TOKEN=$(curl -sf -X POST "$PB/api/collections/_superusers/auth-with-password" \
                    -H "Content-Type: application/json" \
                    -d "{\"identity\":\"$PB_ADMIN_EMAIL\",\"password\":\"$PB_ADMIN_PASSWORD\"}" \
                    | jq -er .token)
                  CUTOFF=$(date -u -d '30 days ago' +'%Y-%m-%d %H:%M:%S.000Z')
                  FILTER="sent_at < \"$CUTOFF\""
                  ENCODED=$(printf '%s' "$FILTER" | jq -sRr @uri)
                  echo "[notification-log-prune] cutoff=$CUTOFF"
                  TOTAL=0
                  while :; do
                    PAGE=$(curl -sf "$PB/api/collections/notification_log/records?perPage=500&fields=id&filter=$ENCODED" \
                      -H "Authorization: $TOKEN")
                    IDS=$(printf '%s' "$PAGE" | jq -r '.items[].id')
                    if [ -z "$IDS" ]; then
                      break
                    fi
                    COUNT=0
                    for ID in $IDS; do
                      curl -sf -X DELETE "$PB/api/collections/notification_log/records/$ID" \
                        -H "Authorization: $TOKEN"
                      COUNT=$((COUNT + 1))
                    done
                    TOTAL=$((TOTAL + COUNT))
                    echo "[notification-log-prune] deleted batch=$COUNT total=$TOTAL"
                  done
                  echo "[notification-log-prune] done total=$TOTAL"
              envFrom:
                - secretRef:
                    name: api-secrets

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafafa;
    }
    .header {
      padding: 10px 16px;
      background: #1a1a2e;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 14px; font-weight: 600; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .status-dot.connected { background: #22c55e; }
    .status-dot.disconnected { background: #ef4444; }
    .status-bar {
      padding: 6px 16px;
      font-size: 11px;
      color: #666;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .institution {
      padding: 8px 16px;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .inst-name { font-weight: 600; font-size: 13px; }
    .inst-status {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #dcfce7;
      color: #166534;
    }
    #updateBanner {
      display: none;
      padding: 6px 16px;
      background: #fef3c7;
      color: #92400e;
      font-size: 11px;
      cursor: pointer;
    }
    .settings {
      padding: 8px 16px;
      border-top: 1px solid #e5e5e5;
    }
    .settings label { font-size: 11px; color: #666; display: block; margin-bottom: 2px; }
    .settings input {
      width: 100%;
      padding: 4px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Money Collector</h1>
    <span class="status-dot disconnected" id="serverStatus"></span>
  </div>
  <div class="status-bar">
    <span id="serverLabel">Checking...</span>
  </div>

  <div id="updateBanner"></div>
  <div id="institutions"></div>

  <div id="manualRecord" style="padding: 8px 16px; border-bottom: 1px solid #e5e5e5; display: none;">
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 8px;">
      <div style="font-size: 11px; color: #666;">
        <div style="font-weight: 600; color: #1a1a1a; font-size: 12px;">Manual capture</div>
        <div id="manualStatus">Idle</div>
      </div>
      <button id="manualToggle" style="padding: 6px 12px; border: 0; border-radius: 4px; background: #1a1a2e; color: white; font-size: 12px; cursor: pointer;">Start</button>
    </div>
  </div>

  <div id="activityLog" style="padding: 6px 16px; font-size: 11px; color: #888; max-height: 120px; overflow-y: auto; border-top: 1px solid #e5e5e5;"></div>

  <div class="settings">
    <label>Server URL</label>
    <input type="text" id="serverUrlInput" value="" placeholder="https://ingest.tail56ca88.ts.net">
  </div>

  <script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafafa;
    }
    .header {
      padding: 12px 16px;
      background: #1a1a2e;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.connected { background: #22c55e; }
    .status-dot.disconnected { background: #ef4444; }
    .status-bar {
      padding: 8px 16px;
      font-size: 11px;
      color: #666;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .institution {
      padding: 12px 16px;
      border-bottom: 1px solid #e5e5e5;
      background: white;
    }
    .institution:last-child { border-bottom: none; }
    .inst-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .inst-name { font-weight: 600; font-size: 14px; }
    .inst-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #f0f0f0;
      color: #666;
    }
    .inst-status.detected {
      background: #dcfce7;
      color: #166534;
    }
    .accounts {
      margin: 6px 0;
      font-size: 12px;
      color: #444;
    }
    .account-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
    }
    .account-name { color: #333; }
    .account-balance { font-weight: 500; color: #1a1a1a; }
    .btn-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .sync-btn {
      flex: 1;
      padding: 7px;
      border: none;
      border-radius: 6px;
      background: #1a1a2e;
      color: white;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    .sync-btn:hover { background: #2a2a4e; }
    .sync-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .sync-btn.success { background: #22c55e; }
    .sync-btn.error { background: #ef4444; }
    .cookie-btn {
      padding: 7px 12px;
      border: none;
      border-radius: 6px;
      background: #4a5568;
      color: white;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    .cookie-btn:hover { background: #2d3748; }
    .cookie-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .cookie-btn.success { background: #22c55e; }
    .cookie-btn.error { background: #ef4444; }
    .record-btn {
      padding: 7px 12px;
      border: none;
      border-radius: 6px;
      background: #b91c1c;
      color: white;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    .record-btn:hover { background: #991b1b; }
    .record-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .record-btn.recording {
      background: #dc2626;
      animation: pulse 1.5s infinite;
    }
    .record-btn.success { background: #22c55e; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .sync-result {
      margin-top: 6px;
      font-size: 11px;
      color: #666;
    }
    .settings {
      padding: 10px 16px;
      border-top: 1px solid #e5e5e5;
    }
    .settings label {
      font-size: 11px;
      color: #666;
      display: block;
      margin-bottom: 4px;
    }
    .settings input {
      width: 100%;
      padding: 5px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Money Collector</h1>
    <span class="status-dot disconnected" id="serverStatus"></span>
  </div>
  <div class="status-bar">
    <span id="serverLabel">Checking server...</span>
  </div>

  <div id="institutions"></div>

  <div class="settings">
    <label>Profile (who is logged in?)</label>
    <input type="text" id="profileInput" placeholder="e.g. scott, angela">
    <label>Server port</label>
    <input type="number" id="portInput" value="5555" min="1" max="65535">
  </div>

  <script src="popup.js"></script>
</body>
</html>

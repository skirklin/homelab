services:
  pocketbase:
    build:
      context: .
      dockerfile: infra/docker/pocketbase.Dockerfile
    ports:
      - "8091:8090"
    command:
      - sh
      - -c
      - |
        pocketbase superuser upsert test-admin@test.local testpassword1234 &&
        pocketbase serve --http=0.0.0.0:8090
    tmpfs:
      - /pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/api/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/api-test.Dockerfile
    ports:
      - "3001:3000"
    environment:
      PORT: "3000"
      PB_URL: http://pocketbase:8090
      PB_ADMIN_EMAIL: test-admin@test.local
      PB_ADMIN_PASSWORD: testpassword1234
      API_KEY: test-api-key
      API_KEY_USER_ID: test-user
      API_KEY_USER_EMAIL: test@test.local
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 2s
      timeout: 5s
      retries: 10
